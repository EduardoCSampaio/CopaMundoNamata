<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NACOPA NAMATA</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="favicon.svg" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="google-site-verification" content="c2iuV8caHY8S7Z710KmbpvMk8bf5RmB0DGq7sv2U3r0" />
</head>
<body>
  <div class="bg-fixed"></div>
  <main class="poster-container">
    <aside class="poster-side">
      <!-- Barra lateral preta sem texto -->
    </aside>

    <section class="poster-content">
      <header class="poster-header">
        <span class="eyebrow">Calendário NAMATA</span>
        <h1>Jogos da Copa</h1>
        <p>Calendário  de jogos que vamos transmitir no NAMATA.</p>
      </header>

      <div class="filter-row">
        <button id="teamSelectButton" type="button" class="team-select-button">
          <span id="teamSelectLabel">Todas as seleções</span>
          <span class="arrow">▾</span>
        </button>
        <div id="teamSelectMenu" class="team-select-menu hidden"></div>
      </div>

      <div id="posterSchedule" class="poster-schedule"></div>
    </section>
  </main>

  <script src="poster.js"></script>
</body>
</html>
